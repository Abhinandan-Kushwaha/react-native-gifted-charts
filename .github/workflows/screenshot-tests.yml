name: PR Screenshot Tests

on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  screenshot-tests:
    runs-on: macos-latest

    steps:
      - name: Checkout react-native-gifted-charts
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies (gifted-charts)
        run: rm -rf node_modules package-lock.json && npm install --legacy-peer-deps

      - name: Build react-native-gifted-charts
        run: npm run build

      - name: Pack local library
        run: npm pack

      - name: Checkout TestingCharts repo
        uses: actions/checkout@v4
        with:
          repository: Abhinandan-Kushwaha/TestingCharts
          path: TestingCharts

      - name: Create branch from PR name
        run: |
          cd TestingCharts
          BRANCH_NAME="${{ github.event.pull_request.title }}"
          BRANCH_NAME=$(echo "$BRANCH_NAME" | tr ' ' '-' | tr -cd '[:alnum:]-_')
          git fetch origin pre-merge
          git checkout pre-merge
          git pull origin pre-merge
          git checkout -b "$BRANCH_NAME"
          echo "Using branch: $BRANCH_NAME"

      - name: Install generated package in TestingCharts
        run: |
          cd TestingCharts
          npm install ../*.tgz

      - name: Install canvas system dependencies
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install pkg-config cairo pango libpng jpeg giflib librsvg pixman
          echo "PKG_CONFIG_PATH=/opt/homebrew/lib/pkgconfig:/opt/homebrew/share/pkgconfig:/opt/homebrew/opt/pango/lib/pkgconfig:/opt/homebrew/opt/cairo/lib/pkgconfig:/opt/homebrew/opt/libpng/lib/pkgconfig:/opt/homebrew/opt/jpeg/lib/pkgconfig:/opt/homebrew/opt/giflib/lib/pkgconfig:/opt/homebrew/opt/librsvg/lib/pkgconfig:/usr/local/lib/pkgconfig:/usr/local/share/pkgconfig" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L/opt/homebrew/lib -L/usr/local/lib" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I/opt/homebrew/include -I/usr/local/include" >> "$GITHUB_ENV"
          echo "npm_config_python=$(which python3)" >> "$GITHUB_ENV"

      - name: Verify pkg-config
        run: |
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
          pkg-config --modversion pango
          pkg-config --modversion cairo
          pkg-config --libs pangocairo
          brew list

      - name: Install dependencies (TestingCharts)
        run: |
          cd TestingCharts
          echo "Using PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
          npm install

      - name: Build TestingCharts
        run: |
          cd TestingCharts
          npm run build

      - name: Run screenshot tests
        run: |
          cd TestingCharts
          npm run ss-test

      # Android emulator boot step
      - name: Run Android app on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            cd TestingCharts
            npm run android
